<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CamouFlow - Remote Browser Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #topbar { background: #161822; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2d3a; flex-shrink: 0; }
  #topbar h2 { font-size: 14px; font-weight: 600; color: #67e8f9; }
  #topbar .info { font-size: 12px; color: #888; }
  #status { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: #1a1d2e; border: 1px solid #2a2d3a; }
  #status.connected { color: #4ade80; border-color: #4ade8040; }
  #status.error { color: #f87171; border-color: #f8717140; }
  #screen { flex: 1; display: flex; align-items: center; justify-content: center; background: #0a0b10; position: relative; }
  #screen canvas { max-width: 100%; max-height: 100%; }
  #placeholder { color: #555; font-size: 14px; text-align: center; }
  #placeholder .msg { margin-top: 8px; color: #444; }
</style>
</head>
<body>
<div id="topbar">
  <div><h2>Browser Viewer</h2><span class="info" id="infoText">Connecting...</span></div>
  <span id="status">connecting</span>
</div>
<div id="screen">
  <div id="placeholder">
    <div>Loading noVNC client...</div>
    <div class="msg">If this does not load, ensure x11vnc and websockify are running on the server.</div>
  </div>
</div>

<script type="module">
  import RFB from "https://cdn.jsdelivr.net/npm/@novnc/novnc@1.5.0/lib/rfb.js";

  const params = new URLSearchParams(location.search);
  const host = params.get("host") || location.hostname;
  const port = parseInt(params.get("port") || "0");
  const profile = params.get("profile") || "unknown";

  const statusEl = document.getElementById("status");
  const infoEl = document.getElementById("infoText");
  const screenEl = document.getElementById("screen");
  const placeholder = document.getElementById("placeholder");

  if (!port || port === 0) {
    statusEl.textContent = "no VNC port";
    statusEl.className = "error";
    infoEl.textContent = "Missing VNC port parameter";
    return;
  }

  infoEl.textContent = "Profile: " + profile + " | " + host + ":" + port;

  // Use websockify: VNC on localhost:port bridged by websockify
  const url = "ws://" + host + ":" + port + "/";

  try {
    const rfb = new RFB(screenEl, url, {
      credentials: { password: "" },
      shared: true,
      view_only: true,
      quality_level: 8,
      compression_level: 2,
      resize_session: true,
    });

    rfb.addEventListener("connect", () => {
      statusEl.textContent = "connected";
      statusEl.className = "connected";
      if (placeholder) placeholder.remove();
    });

    rfb.addEventListener("disconnect", (e) => {
      statusEl.textContent = "disconnected";
      statusEl.className = "error";
      infoEl.textContent = e.detail.clean ? "Connection closed" : "Connection lost";
    });

    rfb.addEventListener("credentialsrequired", () => {
      rfb.sendCredentials({ password: "" });
    });

    rfb.viewOnly = true;
    rfb.scaleViewport = true;
    rfb.resizeSession = true;
  } catch (e) {
    statusEl.textContent = "error";
    statusEl.className = "error";
    infoEl.textContent = "noVNC init failed: " + e.message;
  }
</script>
</body>
</html>
